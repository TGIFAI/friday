services:
  friday:
    build:
      context: ..
      args:
        VERSION: ${VERSION:-dev}
    container_name: friday
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - friday-home:/root/.friday
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: 30m

volumes:
  friday-home:
