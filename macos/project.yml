name: Friday
options:
  bundleIdPrefix: sh.tgif
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: sh.tgif.friday
    INFOPLIST_FILE: Info.plist
    CODE_SIGN_ENTITLEMENTS: Friday.entitlements
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
    MARKETING_VERSION: "0.1.0"

targets:
  Friday:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - path: Assets.xcassets
    dependencies:
      - package: Yams
        product: Yams
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    preBuildScripts:
      - name: "Verify Go Binary"
        shell: /bin/bash
        script: |
          if [ ! -f "${SRCROOT}/Resources/friday-core" ]; then
            echo "warning: friday-core binary not found in Resources/ — build will succeed but app cannot launch the runtime."
          fi
    postBuildScripts:
      - name: "Bundle Resources"
        shell: /bin/bash
        script: |
          RESOURCES_SRC="${SRCROOT}/Resources"
          RESOURCES_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          mkdir -p "${RESOURCES_DST}"
          if [ -f "${RESOURCES_SRC}/friday-core" ]; then
            cp "${RESOURCES_SRC}/friday-core" "${RESOURCES_DST}/friday-core"
            chmod +x "${RESOURCES_DST}/friday-core"
            echo "Bundled friday-core ($(du -h "${RESOURCES_DST}/friday-core" | cut -f1))"
          fi
          if [ -d "${RESOURCES_SRC}/skills" ]; then
            rm -rf "${RESOURCES_DST}/skills"
            cp -r "${RESOURCES_SRC}/skills" "${RESOURCES_DST}/skills"
            echo "Bundled skills"
          fi
