name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: friday

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout skills
        uses: actions/checkout@v4
        with:
          repository: TGIFAI/skills
          path: skills

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          STAGING="${APP_NAME}"
          mkdir -p "${STAGING}/skills" "${STAGING}/logs"
          cp -r skills/* "${STAGING}/skills/"
          cp config.yaml.example "${STAGING}/"

          DATE="$(date -u +%Y%m%d%H%M%S)"
          GIT_SHA="${GITHUB_SHA::7}"
          EXT=""
          if [ "${GOOS}" = "windows" ]; then
            EXT=".exe"
          fi

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X github.com/tgifai/friday.DATE=${DATE} -X github.com/tgifai/friday.MAGIC=${GIT_SHA} -X github.com/tgifai/friday.VERSION=${VERSION}" \
            -o "${STAGING}/${APP_NAME}${EXT}" \
            ./cmd/friday

          echo "BINARY_PATH=${STAGING}/${APP_NAME}${EXT}" >> "$GITHUB_ENV"
          echo "STAGING=${STAGING}" >> "$GITHUB_ENV"

      - name: Compress binary with UPX
        if: matrix.goos == 'linux' || (matrix.goos == 'windows' && matrix.goarch == 'amd64')
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: ${{ env.BINARY_PATH }}
          args: --best --lzma

      - name: Prepare macOS core binary
        if: matrix.goos == 'darwin'
        run: cp "${{ env.BINARY_PATH }}" "friday-core-${{ matrix.goarch }}"

      - name: Package archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          NAME="${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p output

          tar -czf "output/${NAME}.tar.gz" "${STAGING}"
          rm -rf "${STAGING}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/*.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Upload macOS core binary
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-core-${{ matrix.goarch }}
          path: friday-core-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 1

  build-macos-app:
    name: Friday.app (${{ matrix.arch }})
    runs-on: macos-15
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            goarch: arm64
          - arch: x86_64
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout skills
        uses: actions/checkout@v4
        with:
          repository: TGIFAI/skills
          path: skills

      - name: Download Go binary
        uses: actions/download-artifact@v4
        with:
          name: macos-core-${{ matrix.goarch }}
          path: macos/Resources

      - name: Prepare Go binary
        run: |
          cd macos/Resources
          mv friday-core-${{ matrix.goarch }} friday-core
          chmod +x friday-core
          echo "Go core: $(file friday-core) — $(du -h friday-core | cut -f1)"

      - name: Bundle skills
        run: |
          if [ -d skills ]; then
            rm -rf macos/Resources/skills
            rsync -a --exclude='.git' skills/ macos/Resources/skills/
          fi

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || brew link --overwrite xcodegen

      - name: Generate Xcode project
        run: cd macos && xcodegen generate --quiet

      - name: Build app
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          MKT_VERSION="${VERSION#v}"
          cd macos
          xcodebuild \
            -project Friday.xcodeproj \
            -scheme Friday \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -arch ${{ matrix.arch }} \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="${MKT_VERSION}" \
            2>&1 | tee /tmp/xcodebuild.log | tail -30

      - name: Verify app bundle
        run: |
          set -euo pipefail
          APP_PATH="macos/build/DerivedData/Build/Products/Release/Friday.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Friday.app not found"
            exit 1
          fi
          if [ ! -f "$APP_PATH/Contents/Resources/friday-core" ]; then
            echo "::error::friday-core not found in app bundle"
            exit 1
          fi
          echo "Friday.app size: $(du -sh "$APP_PATH" | cut -f1)"
          echo "Swift binary: $(file "$APP_PATH/Contents/MacOS/Friday")"
          echo "Go core: $(file "$APP_PATH/Contents/Resources/friday-core")"

      - name: Create DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          APP_PATH="macos/build/DerivedData/Build/Products/Release/Friday.app"

          mkdir -p dmg-staging
          cp -r "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          mkdir -p output
          hdiutil create \
            -volname "Friday ${VERSION}" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "output/${APP_NAME}_${VERSION}_darwin_${{ matrix.goarch }}.dmg"

          rm -rf dmg-staging

          # Compress DMG into tar.gz
          tar -czf "output/${APP_NAME}_${VERSION}_darwin_${{ matrix.goarch }}.dmg.tar.gz" \
            -C output "${APP_NAME}_${VERSION}_darwin_${{ matrix.goarch }}.dmg"
          rm -f "output/${APP_NAME}_${VERSION}_darwin_${{ matrix.goarch }}.dmg"
          echo "DMG archive: $(du -h output/*.tar.gz | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-darwin-app-${{ matrix.goarch }}
          path: output/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, build-macos-app]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: output

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd output
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            output/*.tar.gz
            output/checksums.txt
